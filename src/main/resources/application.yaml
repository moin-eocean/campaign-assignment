spring:
  application:
    name: campaign-management

  datasource:
    url: jdbc:mysql://localhost:3306/campaign?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: macerace120
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual   # manual ack for reliability
        prefetch: 1

  data:
    redis:
      host: localhost
      port: 6379
      password: yourpassword   # if set, warna remove karo
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

server:
  port: 8080